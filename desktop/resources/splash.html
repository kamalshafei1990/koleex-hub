<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:;" />
    <title>Koleex Hub</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        background: #0A0A0A;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        display: flex; align-items: center; justify-content: center;
        height: 100vh; overflow: hidden; user-select: none;
        border: 1px solid rgba(255,255,255,0.06); border-radius: 14px;
      }
      .wrap { display: flex; flex-direction: column; align-items: center; gap: 22px; }
      .word {
        font-weight: 800; letter-spacing: 0.18em; font-size: 30px;
        color: #fff;
      }
      .word b { color: #0066FF; font-weight: 800; }
      .sub { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #666; }
      .bar {
        width: 180px; height: 3px; border-radius: 3px; overflow: hidden;
        background: rgba(255,255,255,0.08); position: relative;
      }
      .bar::after {
        content: ""; position: absolute; inset: 0; width: 40%;
        background: linear-gradient(90deg, transparent, #0066FF, transparent);
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
      .foot { position: absolute; bottom: 16px; font-size: 10.5px; color: #444; letter-spacing: 0.08em; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="word">KOLEE<b>X</b></div>
      <div class="sub">Koleex Hub</div>
      <div class="bar" aria-hidden="true"></div>
    </div>
    <div class="foot">Loading your workspace…</div>
  </body>
</html>
