# electron-builder — Koleex Hub desktop packaging.
# Produces unsigned local installers. Code signing + notarization + auto-update
# publishing are wired as SAFE hooks (no-op until certs/creds are provided).
#
# Versioning: the installer/app version comes from package.json "version"
# (semver). Bump it per release (see RELEASE.md). The desktop shell version is
# independent of the web app, which updates continuously via Vercel.

appId: com.koleexgroup.desktop
productName: Koleex Hub
copyright: © Koleex International Group

directories:
  output: release
  buildResources: resources

# Only the compiled shell + resources ship — no Next.js/web assets are bundled
# (the app loads the live production URL at runtime).
files:
  - dist/**/*
  - resources/**/*
  - package.json

# Ad-hoc sign the macOS app so it launches on Apple Silicon (unsigned arm64
# apps are reported as "damaged"). No-op when a real Developer ID is set.
afterPack: scripts/afterpack-adhoc-sign.cjs

# macOS notarization runs here ONLY when Apple creds are set (safe no-op
# otherwise — see scripts/notarize.cjs).
afterSign: scripts/notarize.cjs

# Auto-update publishing is intentionally DISABLED this round.
# Enable later (GitHub Releases recommended — see RELEASE.md):
#   publish:
#     provider: github
#     owner: kamalshafei1990
#     repo: koleex-hub
publish: null

# ── File associations (architecture for future PDF/catalog support) ─────────
# Prepared but commented: enabling lets the desktop app register as a handler
# for catalog/PDF files (double-click → open in Koleex Hub). Requires per-type
# icons (resources/pdf.icns / pdf.ico) and renderer handling before turning on.
# fileAssociations:
#   - ext: pdf
#     name: PDF Document
#     role: Viewer
#     icon: resources/pdf
#   - ext: koleex
#     name: Koleex Catalog
#     role: Editor
#     icon: resources/icon

# ── macOS ────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.business
  icon: resources/icon.png
  target:
    - target: dmg
    - target: zip
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    CFBundleDisplayName: Koleex Hub
    NSHumanReadableCopyright: © Koleex International Group
  # Signing: set CSC_LINK + CSC_KEY_PASSWORD (Developer ID Application) to sign.
  # Notarization: set APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
  # (handled by afterSign hook above).
dmg:
  title: ${productName} ${version}
  artifactName: ${productName}-${version}.${ext}

# ── Windows ──────────────────────────────────────────────────────────────
win:
  icon: resources/icon.png
  target:
    - target: nsis
    - target: portable
  # Signing: provide an Authenticode/EV cert via CSC_LINK + CSC_KEY_PASSWORD
  # (or a cloud/HSM signer). Unsigned for now.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  menuCategory: Koleex
  shortcutName: Koleex Hub
  uninstallDisplayName: Koleex Hub ${version}
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  artifactName: ${productName}-Setup-${version}.${ext}
  # Branded installer header/sidebar (provide the assets to enable):
  #   installerIcon: resources/icon.ico
  #   uninstallerIcon: resources/icon.ico
  #   installerHeaderIcon: resources/icon.ico
  #   installerHeader: resources/installerHeader.bmp   # 150x57
  #   installerSidebar: resources/installerSidebar.bmp # 164x314
portable:
  artifactName: ${productName}-Portable-${version}.${ext}

# ── Linux (future / optional) ──────────────────────────────────────────────
linux:
  icon: resources/icon.png
  category: Office
  target:
    - AppImage
